<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet">
  <meta name="referrer" content="no-referrer">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="format-detection" content="telephone=yes">
  <meta name="theme-color" content="#1e40af">
  <title>疑義照会プロトコル検索</title>
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <div class="header-top">
      <h1>疑義照会プロトコル</h1>
      <div class="header-right">
        <span class="meta" id="metaInfo"></span>
        <button type="button" id="changelogBtn" class="changelog-btn">更新履歴</button>
      </div>
    </div>
    <div class="search-bar">
      <input type="search" id="searchInput" placeholder="医療機関・カテゴリ・キーワードで検索…" autocomplete="off">
      <button type="button" id="clearBtn" class="clear-btn" aria-label="クリア">×</button>
    </div>
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">カテゴリ</span>
        <div class="chips" id="categoryChips"></div>
      </div>
      <div class="filter-group">
        <span class="filter-label">医療機関</span>
        <div class="chips" id="institutionChips"></div>
      </div>
    </div>
  </header>

  <main class="layout">
    <section class="matrix-pane">
      <div class="pane-header">
        <h2>一覧</h2>
        <span class="hint">セルをタップで詳細表示</span>
      </div>
      <div class="matrix-wrapper">
        <table id="matrixTable"></table>
        <p id="emptyState" class="empty-state" hidden>該当するプロトコルがありません</p>
      </div>
    </section>

    <aside class="detail-pane" id="detailPane">
      <div class="pane-header">
        <h2>詳細</h2>
        <button type="button" id="closeDetailBtn" class="close-btn" aria-label="閉じる" hidden>×</button>
      </div>
      <div id="detailContent" class="detail-content">
        <p class="placeholder">マトリクスのセル（○）をタップすると、簡素化条件・連絡先・元 PDF への参照が表示されます。</p>
      </div>
    </aside>
  </main>

  <div id="changelogModal" class="modal" hidden>
    <div class="modal-backdrop" id="changelogBackdrop"></div>
    <div class="modal-panel" role="dialog" aria-modal="true" aria-label="更新履歴">
      <div class="modal-header">
        <h2>更新履歴</h2>
        <button type="button" id="changelogClose" class="close-btn" aria-label="閉じる">×</button>
      </div>
      <div id="changelogBody" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
